name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm test
      - run: npm run validate:spec
      - run: node scripts/validate-spec.mjs .draftspec/features/bulk-tagging.approved.json
      - run: npm run export:bulk-tagging
      - run: npm run map:bulk-tagging
